<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>YouTube</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen
  ></iframe>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var videoId = params.get('v');
      var player = document.getElementById('player');
      var siteOrigin = 'https://jna-music.vercel.app';

      if (!videoId) {
        document.body.textContent = '동영상 ID가 없습니다.';
        return;
      }

      var embedParams = new URLSearchParams({
        feature: 'oembed',
        rel: '0',
        playsinline: '1',
        autoplay: params.get('autoplay') || '1',
        origin: siteOrigin
      });

      player.src = 'https://www.youtube.com/embed/' + encodeURIComponent(videoId) + '?' + embedParams.toString();
    })();
  </script>
</body>
</html>
